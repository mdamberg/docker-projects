models:
  - name: monthly_transactions
    columns:
      - name: month_start_date
        description: ""
        config:
          meta:
            dimension:
              type: date
      - name: month_end_date
        description: ""
        config:
          meta:
            dimension:
              type: date
      - name: transaction_date
        description: ""
        config:
          meta:
            dimension:
              type: date
      - name: account_type
        description: ""
        config:
          meta:
            dimension:
              type: string
      - name: account_name
        description: ""
        config:
          meta:
            dimension:
              type: string
      - name: account_number
        description: ""
        config:
          meta:
            dimension:
              type: string
      - name: transaction_name
        description: ""
        config:
          meta:
            dimension:
              type: string
      - name: transaction_category
        description: ""
        config:
          meta:
            dimension:
              type: string
      - name: transaction_type
        description: ""
        config:
          meta:
            dimension:
              type: string
      - name: transaction_amount
        description: "Transaction amount (positive for credits, negative for debits)"
        config:
          meta:
            dimension:
              type: number
            metrics:
              total_income:
                type: sum
                label: "Total Income"
                description: "Sum of transactions categorized as Income"
                sql: "CASE WHEN ${transaction_category} = 'Income' THEN ${transaction_amount} ELSE 0 END"
              total_expenses:
                type: sum
                label: "Total Expenses"
                description: "Sum of all debit transactions (as positive value)"
                sql: "CASE WHEN ${transaction_type} = 'Debit' THEN ABS(${transaction_amount}) ELSE 0 END"
              net_amount:
                type: sum
                label: "Net Amount"
                description: "Total income minus total expenses"
              regular_expenses:
                type: sum
                label: "Regular Expenses"
                description: "Sum of debit transactions excluding large one-time expenses (>$1000)"
                sql: "CASE WHEN ${transaction_type} = 'Debit' AND ${is_large_transaction_flag} = 0 THEN ABS(${transaction_amount}) ELSE 0 END"
              regular_net_amount:
                type: sum
                label: "Regular Net Amount"
                description: "Income minus regular expenses (excludes large transactions)"
                sql: "CASE WHEN ${transaction_category} = 'Income' THEN ${transaction_amount} WHEN ${is_large_transaction_flag} = 0 THEN ${transaction_amount} ELSE 0 END"
      - name: is_recurring_payment_flag
        description: "1 if transaction description contains 'RECURRING PAYMENT', 0 otherwise"
        config:
          meta:
            dimension:
              type: number
      - name: is_large_transaction_flag
        description: "1 if absolute transaction amount > $1000, 0 otherwise"
        config:
          meta:
            dimension:
              type: number
