models:
  - name: stg_teller_accounts
    description: "Cleaned and standardized bank accounts from Teller API"
    columns:
      - name: account_pk
        description: "Primary key from raw table"
        tests:
          - unique
          - not_null
      - name: account_skey
        description: "Surrogate key based on teller_account_id"
      - name: teller_account_id
        description: "Teller's unique account identifier"
        tests:
          - unique
          - not_null
      - name: enrollment_id
        description: "Teller enrollment identifier"
      - name: institution_name
        description: "Name of the financial institution"
      - name: institution_id
        description: "Teller's institution identifier"
      - name: account_name
        description: "Account name as shown in banking app"
      - name: account_type
        description: "Standardized account type (checking, savings, credit)"
      - name: account_subtype
        description: "Original Teller account subtype"
      - name: account_status
        description: "Account connection status"
      - name: currency
        description: "Currency code (USD)"
      - name: account_number
        description: "Last four digits of account number"
      - name: account_holder
        description: "Derived account holder (Matt or Jessica)"
      - name: inserted_at
        description: "Timestamp when the record was first inserted"
      - name: updated_at
        description: "Timestamp when the record was last updated"
