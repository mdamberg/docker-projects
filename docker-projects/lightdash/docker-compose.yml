services:
  lightdash:
    image: lightdash/lightdash:latest
    container_name: lightdash
    restart: unless-stopped
    depends_on:
      lightdash-db:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      # Lightdash internal database
      PGHOST: lightdash-db
      PGPORT: 5432
      PGUSER: ${LIGHTDASH_PG_USER}
      PGPASSWORD: ${LIGHTDASH_PG_PASSWORD}
      PGDATABASE: lightdash

      # Security
      LIGHTDASH_SECRET: ${LIGHTDASH_SECRET}

      # Site settings
      SITE_URL: http://10.0.0.7:8090
      ALLOW_MULTIPLE_ORGS: "false"

      # Headless browser for exports (optional)
      HEADLESS_BROWSER_HOST: headless-browser
      HEADLESS_BROWSER_PORT: 3000

      # S3 storage (MinIO) for pagination/results
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: lightdash
      S3_REGION: us-east-1
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_FORCE_PATH_STYLE: "true"
    ports:
      - "8090:8080"
    volumes:
      # Mount your dbt project
      - ../home_metrics_dbt:/usr/app/dbt:ro
    networks:
      - lightdash
      - home-metrics
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  lightdash-db:
    image: postgres:15-alpine
    container_name: lightdash-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${LIGHTDASH_PG_USER}
      POSTGRES_PASSWORD: ${LIGHTDASH_PG_PASSWORD}
      POSTGRES_DB: lightdash
      TZ: ${TZ:-America/Chicago}
    volumes:
      - lightdash_pgdata:/var/lib/postgresql/data
    networks:
      - lightdash
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lightdash -d lightdash"]
      interval: 10s
      timeout: 5s
      retries: 5

  headless-browser:
    image: browserless/chrome:latest
    container_name: lightdash-browser
    restart: unless-stopped
    networks:
      - lightdash

  minio:
    image: minio/minio:latest
    container_name: lightdash-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - lightdash
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Init container to create the bucket
  minio-init:
    image: minio/mc:latest
    container_name: lightdash-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb myminio/lightdash --ignore-existing;
      exit 0;
      "
    networks:
      - lightdash

networks:
  lightdash:
    name: lightdash
    driver: bridge
  home-metrics:
    external: true

volumes:
  lightdash_pgdata:
  minio_data:
